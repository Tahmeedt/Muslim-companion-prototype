<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <style>
        :root {
            --primary: #0B6B3A;
            --primary-light: #22C55E;
            --bg: #0F172A;
            --card: #1E293B;
            --text: #FFFFFF;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text);
        }

        .card {
            background: var(--card);
            padding: 32px;
            border-radius: 14px;
            width: 320px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            text-align: center;
            color: var(--primary-light);
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            outline: none;
            background: #0b1220;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input:focus {
            border: 1px solid var(--primary-light);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        button:hover {
            background: var(--primary-light);
            color: black;
        }

        .msg {
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            opacity: 0.9;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 14px;
            color: var(--primary-light);
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>🕌 Login</h1>

        <input id="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Password" />

        <button onclick="login()">Login</button>

        <p id="msg" class="msg"></p>

        <a href="/signup.html">Create new account</a>

    </div>

    <script>
        function login() {
                console.log("LOGIN CLICKED");

                fetch("/api/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        email: document.getElementById("email").value,
                        password: document.getElementById("password").value
                    })
                })
                    .then(res => res.json())
                    .then(data => {
                        console.log("LOGIN RESPONSE:", data);

                        document.getElementById("msg").innerText = data.message;

                        if (data.message === "Login successful") {
                            localStorage.setItem("user", JSON.stringify({
                                email: data.email,
                                userId: data.userId,
                                name: data.name
                            }));

                            window.location.href = "/index.html";
                        }
                    })
                    .catch(err => {
                        console.log("LOGIN ERROR:", err);
                    });
            }
    </script>

</body>

</html>
